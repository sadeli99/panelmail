<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Inbox Saya - MailPanel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fca5a5; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #ef4444; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .modal-animate { animation: fadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        /* Safe area for mobile notch */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="text-slate-900 selection:bg-red-100 selection:text-red-900 overflow-hidden">

    <div class="flex h-screen w-full">
        
        <!-- ==========================================
             SIDEBAR (DESKTOP)
        =========================================== -->
        <aside class="hidden md:flex w-72 flex-col bg-white border-r border-slate-200 shadow-sm z-20">
            <div class="h-20 flex items-center px-8 border-b border-slate-100 shrink-0">
                <div class="w-9 h-9 bg-gradient-to-tr from-red-600 to-rose-500 rounded-xl flex items-center justify-center mr-3 shadow-lg shadow-red-200">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                </div>
                <span class="text-xl font-extrabold text-slate-900 tracking-tight">MailPanel</span>
            </div>
            
            <nav class="flex-1 px-4 py-8 space-y-2 overflow-y-auto">
                <p class="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Menu Utama</p>
                <button id="nav-desktop-inbox" onclick="switchTab('inbox')" class="nav-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-sm font-bold text-red-600 bg-red-50 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                    Pesan Masuk
                </button>
                <button id="nav-desktop-profile" onclick="switchTab('profile')" class="nav-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-sm font-bold text-slate-500 hover:bg-slate-50 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    Profil Saya
                </button>
            </nav>

            <div class="p-5 border-t border-slate-100 shrink-0 bg-slate-50/50">
                <div class="flex items-center gap-3 mb-4 px-2">
                    <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 font-bold shrink-0" id="avatarInitial">U</div>
                    <div class="overflow-hidden">
                        <p class="text-xs font-extrabold text-slate-900 truncate">Pengguna</p>
                        <p id="desktopEmailDisplay" class="text-[10px] text-slate-500 font-medium truncate"></p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ==========================================
             MAIN CONTENT AREA
        =========================================== -->
        <div class="flex-1 flex flex-col h-screen overflow-hidden relative">
            
            <!-- HEADER MOBILE -->
            <header class="md:hidden h-16 bg-white border-b border-slate-200 flex items-center justify-between px-5 shrink-0 z-30 shadow-sm">
                <div class="flex items-center gap-2.5">
                    <div class="w-8 h-8 bg-gradient-to-tr from-red-600 to-rose-500 rounded-lg flex items-center justify-center shadow-md shadow-red-200">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </div>
                    <span class="text-lg font-extrabold text-slate-900">MailPanel</span>
                </div>
            </header>

            <!-- SCROLLABLE CONTENT -->
            <main class="flex-1 overflow-y-auto custom-scrollbar p-4 md:p-8 pb-24 md:pb-8">
                
                <!-- TAB: INBOX -->
                <div id="view-inbox" class="tab-content animate-fade-in h-full flex flex-col">
                    <div class="mb-6 shrink-0 flex flex-col sm:flex-row sm:items-end justify-between gap-4">
                        <div>
                            <h2 class="text-2xl font-extrabold text-slate-900">Inbox Saya</h2>
                            <p class="text-sm text-slate-500 font-medium mt-1">Baca pesan masuk untuk <span id="activeEmail" class="font-bold text-slate-700"></span></p>
                        </div>
                        <button onclick="loadMessages()" class="flex items-center justify-center gap-2 text-red-600 font-bold text-sm bg-red-50 hover:bg-red-100 px-5 py-2.5 rounded-xl transition-all shadow-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                            Refresh Inbox
                        </button>
                    </div>
                    
                    <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 flex flex-col flex-1 overflow-hidden min-h-[500px]">
                        <div id="list" class="flex-1 p-5 sm:p-7 bg-slate-50/50 grid gap-4 grid-cols-1 md:grid-cols-2 lg:grid-cols-3 content-start overflow-y-auto custom-scrollbar">
                            <!-- Injected by JS -->
                        </div>
                    </div>
                </div>

                <!-- TAB: PROFILE -->
                <div id="view-profile" class="tab-content hidden animate-fade-in">
                    <div class="mb-6">
                        <h2 class="text-2xl font-extrabold text-slate-900">Profil Pengguna</h2>
                        <p class="text-sm text-slate-500 font-medium mt-1">Informasi akun Anda saat ini.</p>
                    </div>

                    <div class="bg-white rounded-[2rem] p-6 sm:p-10 shadow-sm border border-slate-100 max-w-2xl mx-auto mt-4 sm:mt-10 text-center">
                        <div class="w-24 h-24 bg-gradient-to-tr from-red-600 to-rose-500 text-white text-4xl rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-red-200" id="profileAvatar">U</div>
                        <h3 class="text-xl font-extrabold text-slate-900 mb-1" id="profileEmail">user@domain.com</h3>
                        <span class="inline-block px-3 py-1 bg-slate-100 text-slate-600 text-xs font-extrabold uppercase rounded-lg mb-8 tracking-wider">User Biasa</span>
                        
                        <div class="pt-6 border-t border-slate-100">
                            <button onclick="logout()" class="w-full sm:w-auto mx-auto flex justify-center items-center gap-2 px-8 py-4 text-base font-bold text-white bg-rose-600 rounded-2xl hover:bg-rose-700 transition-all shadow-lg shadow-rose-200">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                                Keluar dari Akun
                            </button>
                        </div>
                    </div>
                </div>

            </main>
        </div>

        <!-- ==========================================
             BOTTOM NAVIGATION (MOBILE ONLY)
        =========================================== -->
        <nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-100 z-40 pb-safe shadow-[0_-4px_20px_-10px_rgba(0,0,0,0.1)] rounded-t-[1.5rem]">
            <div class="flex justify-around items-center h-20 px-2">
                <button id="nav-mob-inbox" onclick="switchTab('inbox')" class="nav-btn-mob flex flex-col items-center justify-center w-full h-full text-red-600 transition-colors">
                    <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                    <span class="text-[11px] font-extrabold">Inbox</span>
                </button>
                <button id="nav-mob-profile" onclick="switchTab('profile')" class="nav-btn-mob flex flex-col items-center justify-center w-full h-full text-slate-400 hover:text-slate-600 transition-colors">
                    <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <span class="text-[11px] font-extrabold">Profil</span>
                </button>
            </div>
        </nav>

    </div> <!-- End Main Flex Layout -->

    <!-- UNIVERSAL MESSAGE MODAL (Responsive & Parses HTML) -->
    <div id="messageModal" class="fixed inset-0 z-[60] hidden flex-col justify-end sm:justify-center items-center">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" onclick="closeMessageModal()"></div>
        <div class="relative w-full max-w-4xl bg-slate-50 sm:rounded-[2rem] rounded-t-[2rem] shadow-2xl overflow-hidden flex flex-col max-h-[92vh] sm:max-h-[85vh] modal-animate sm:m-4 border border-white">
            
            <div class="px-5 sm:px-8 py-5 sm:py-6 border-b border-slate-200/60 flex justify-between items-center bg-white sticky top-0 z-10">
                <h3 class="text-lg sm:text-xl font-extrabold text-slate-900 truncate pr-4" id="modalSubject">Memuat detail...</h3>
                <button onclick="closeMessageModal()" class="text-slate-400 hover:text-slate-700 bg-slate-100 hover:bg-slate-200 p-2.5 rounded-full transition-colors flex-shrink-0">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="overflow-y-auto custom-scrollbar flex-1 bg-slate-50">
                <div class="p-5 sm:p-8 max-w-4xl mx-auto">
                    <div id="modalMeta" class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6 text-sm text-slate-500 bg-white p-4 sm:p-5 rounded-2xl border border-slate-100 shadow-sm">
                        <!-- Injected by JS -->
                    </div>

                    <div id="modalControls" class="mb-4 flex justify-end hidden">
                        <div class="bg-slate-200 p-1.5 rounded-[14px] flex inline-flex text-xs font-bold">
                            <button id="btnViewHtml" class="px-4 py-2 rounded-xl bg-white text-red-600 shadow-sm transition-all" onclick="toggleViewMode('html')">Tampilan Asli</button>
                            <button id="btnViewRaw" class="px-4 py-2 rounded-xl text-slate-500 hover:text-slate-700 transition-all" onclick="toggleViewMode('raw')">Data Mentah</button>
                        </div>
                    </div>

                    <div id="modalBodyContainer" class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden min-h-[300px] flex flex-col">
                        <!-- Injected by JS -->
                    </div>
                </div>
            </div>
            
            <div class="bg-white px-5 sm:px-8 py-5 border-t border-slate-200/60 flex justify-end gap-3 sticky bottom-0">
                <button type="button" onclick="closeMessageModal()" class="px-5 py-3 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200 transition-colors text-sm">Tutup Dialog</button>
                <button type="button" id="modalDeleteBtn" class="px-5 py-3 bg-rose-50 text-rose-600 rounded-xl font-bold hover:bg-rose-100 transition-colors text-sm">Hapus Pesan</button>
            </div>
        </div>
    </div>

    <!-- UI Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-slate-900/30 backdrop-blur-sm z-[70] flex items-center justify-center hidden transition-opacity">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl flex flex-col items-center modal-animate">
            <div class="animate-spin rounded-full h-12 w-12 border-[4px] border-red-100 border-t-red-600 mb-4"></div>
            <p class="text-sm font-extrabold text-slate-700">Mohon tunggu...</p>
        </div>
    </div>

    <script>
        const API_BASE = "https://api.sonten.web.id";

        // --- TAB NAVIGATION LOGIC ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            const targetTab = document.getElementById('view-' + tabId);
            if(targetTab) targetTab.classList.remove('hidden');

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-red-600', 'bg-red-50');
                btn.classList.add('text-slate-500', 'hover:bg-slate-50');
            });
            const deskBtn = document.getElementById('nav-desktop-' + tabId);
            if(deskBtn) {
                deskBtn.classList.remove('text-slate-500', 'hover:bg-slate-50');
                deskBtn.classList.add('text-red-600', 'bg-red-50');
            }

            document.querySelectorAll('.nav-btn-mob').forEach(btn => {
                btn.classList.remove('text-red-600');
                btn.classList.add('text-slate-400');
            });
            const mobBtn = document.getElementById('nav-mob-' + tabId);
            if(mobBtn) {
                mobBtn.classList.remove('text-slate-400');
                mobBtn.classList.add('text-red-600');
            }
        }

        function safeRedirect(url) {
            try { window.location.href = url; } catch (e) {
                document.body.innerHTML = `<div class="p-6 text-center">Dialihkan ke ${url}...</div>`;
            }
        }
        
        // --- AUTH PROTEKSI ---
        let auth = null;
        try {
            const storedAuth = localStorage.getItem("auth_user");
            if (!storedAuth) {
                safeRedirect("./index.html");
            } else {
                auth = JSON.parse(storedAuth);
                if (auth.role !== "user") {
                    safeRedirect("./admin.html"); 
                }
            }
        } catch (error) {
            localStorage.removeItem("auth_user");
            safeRedirect("./index.html");
        }

        // Render UI Profile dari auth
        if (auth) {
            if (document.getElementById('activeEmail')) document.getElementById('activeEmail').textContent = auth.email;
            if (document.getElementById('desktopEmailDisplay')) document.getElementById('desktopEmailDisplay').textContent = auth.email;
            if (document.getElementById('profileEmail')) document.getElementById('profileEmail').textContent = auth.email;
            
            const initial = auth.email.charAt(0).toUpperCase();
            if (document.getElementById('avatarInitial')) document.getElementById('avatarInitial').textContent = initial;
            if (document.getElementById('profileAvatar')) document.getElementById('profileAvatar').textContent = initial;
        }

        function authHeaders() {
            return { "Content-Type": "application/json", "Authorization": "Bearer " + (auth ? auth.token : "") };
        }

        function logout() {
            localStorage.removeItem("auth_user");
            safeRedirect("./index.html");
        }

        function escapeHtml(str) {
            return String(str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        function setLoading(state) {
            const overlay = document.getElementById('loadingOverlay');
            state ? overlay.classList.remove('hidden') : overlay.classList.add('hidden');
        }

        // --- MIME EMAIL PARSER ---
        function decodeQuotedPrintable(input) {
            let str = input.replace(/=\r?\n/g, ''); 
            str = str.replace(/=([a-fA-F0-9]{2})/g, function(match, hex) {
                return String.fromCharCode(parseInt(hex, 16));
            });
            try { return decodeURIComponent(escape(str)); } catch(e) { return str; }
        }

        function parseEmail(raw) {
            if (!raw) return { type: 'text', content: '', raw: '' };

            let content = raw;
            let isHtml = false;

            let isQP = /Content-Transfer-Encoding:\s*quoted-printable/i.test(raw);
            let isBase64 = /Content-Transfer-Encoding:\s*base64/i.test(raw);

            let htmlStartIndex = raw.search(/<!doctype\s+html/i);
            if (htmlStartIndex === -1) htmlStartIndex = raw.search(/<html/i);

            if (htmlStartIndex !== -1) {
                isHtml = true;
                let bodyPart = raw.substring(htmlStartIndex);
                let htmlEndIndex = bodyPart.search(/<\/html>/i);
                if (htmlEndIndex !== -1) bodyPart = bodyPart.substring(0, htmlEndIndex + 7);

                if (isQP) { bodyPart = decodeQuotedPrintable(bodyPart); } 
                else if (isBase64) {
                    try { bodyPart = decodeURIComponent(escape(atob(bodyPart.replace(/\s/g, '')))); } 
                    catch(e) { try { bodyPart = atob(bodyPart.replace(/\s/g, '')); } catch(e2) {} }
                }
                content = bodyPart;
            } else {
                let parts = raw.split(/\r?\n\r?\n/);
                if (parts.length > 1) {
                    let bodyPart = parts.slice(1).join('\n\n').trim();
                    if (isQP) bodyPart = decodeQuotedPrintable(bodyPart);
                    else if (isBase64) try { bodyPart = atob(bodyPart.replace(/\s/g, '')); } catch(e) {}
                    content = bodyPart;
                }
            }
            return { type: isHtml ? 'html' : 'text', content: content, raw: raw };
        }

        let currentParsedEmail = null;

        function toggleViewMode(mode) {
            if (!currentParsedEmail) return;
            const container = document.getElementById('modalBodyContainer');
            const btnHtml = document.getElementById('btnViewHtml');
            const btnRaw = document.getElementById('btnViewRaw');

            container.innerHTML = '';

            if (mode === 'html') {
                btnHtml.className = "px-4 py-2 rounded-xl bg-white text-red-600 shadow-sm transition-all";
                btnRaw.className = "px-4 py-2 rounded-xl text-slate-500 hover:text-slate-700 transition-all bg-transparent";
                
                const iframe = document.createElement('iframe');
                iframe.className = "w-full min-h-[400px] border-0 bg-white flex-1 rounded-b-2xl";
                iframe.sandbox = "allow-same-origin allow-popups"; 
                iframe.srcdoc = currentParsedEmail.content;
                container.appendChild(iframe);
            } else {
                btnRaw.className = "px-4 py-2 rounded-xl bg-white text-red-600 shadow-sm transition-all";
                btnHtml.className = "px-4 py-2 rounded-xl text-slate-500 hover:text-slate-700 transition-all bg-transparent";

                const pre = document.createElement('pre');
                pre.className = "whitespace-pre-wrap font-mono text-slate-700 leading-relaxed text-xs p-5 flex-1 overflow-x-auto rounded-b-2xl bg-slate-50 m-0";
                pre.textContent = currentParsedEmail.raw;
                container.appendChild(pre);
            }
        }

        function closeMessageModal() {
            document.getElementById('messageModal').classList.add('hidden');
            document.getElementById('messageModal').classList.remove('flex');
            currentParsedEmail = null;
        }

        async function openModalAndFetchData(id) {
            const modal = document.getElementById('messageModal');
            const mSubj = document.getElementById('modalSubject');
            const mMeta = document.getElementById('modalMeta');
            const mControls = document.getElementById('modalControls');
            const mBodyContainer = document.getElementById('modalBodyContainer');
            const mDelBtn = document.getElementById('modalDeleteBtn');

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            mSubj.textContent = "Memuat detail pesan...";
            mMeta.innerHTML = `<div class="animate-pulse h-4 bg-slate-200 rounded-full w-40"></div>`;
            mControls.classList.add('hidden');
            mBodyContainer.innerHTML = `<div class="p-5 animate-pulse space-y-3"><div class="h-4 bg-slate-200 rounded-full w-full"></div><div class="h-4 bg-slate-200 rounded-full w-5/6"></div></div>`;
            mDelBtn.onclick = null;

            try {
                const res = await fetch(API_BASE + "/api/user/message/" + id, { headers: authHeaders() });
                const data = await res.json();

                if (!res.ok) throw new Error(data.error || "Gagal memuat detail pesan");

                mSubj.textContent = escapeHtml(data.subject || "(No Subject)");
                
                mMeta.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-red-100 text-red-600 flex items-center justify-center font-bold text-sm shrink-0">
                            ${(data.from_email || "?").charAt(0).toUpperCase()}
                        </div>
                        <div class="flex flex-col">
                            <span class="font-bold text-slate-900">${escapeHtml(data.from_email)}</span>
                            <span class="text-xs text-slate-500 font-medium">Kepada: ${escapeHtml(data.user_email || "-")}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 text-xs font-bold text-slate-400 bg-slate-50 px-3 py-2 rounded-xl mt-3 sm:mt-0 shrink-0">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        ${data.received_at}
                    </div>
                `;

                currentParsedEmail = parseEmail(data.body_text);

                if (currentParsedEmail.type === 'html') {
                    mControls.classList.remove('hidden');
                    toggleViewMode('html');
                } else {
                    mControls.classList.add('hidden');
                    mBodyContainer.innerHTML = `<pre class="whitespace-pre-wrap font-sans text-slate-700 leading-relaxed text-sm p-6 overflow-x-auto m-0 bg-slate-50">${escapeHtml(currentParsedEmail.content)}</pre>`;
                }

                mDelBtn.onclick = async () => {
                    if (!confirm("Hapus pesan ini secara permanen?")) return;
                    setLoading(true);
                    try {
                        const delRes = await fetch(API_BASE + "/api/user/message/" + id, { method: "DELETE", headers: authHeaders() });
                        if (delRes.ok) {
                            closeMessageModal();
                            loadMessages();
                        } else { alert("Gagal menghapus pesan"); }
                    } catch (e) { alert("Error saat menghapus"); }
                    finally { setLoading(false); }
                };
            } catch (err) {
                mSubj.textContent = "Error";
                mBodyContainer.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center text-rose-500 py-10">
                        <svg class="w-12 h-12 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p class="font-bold">${escapeHtml(err.message)}</p>
                    </div>`;
                mMeta.innerHTML = ``;
            }
        }

        // --- Logic: User Actions ---
        async function loadMessages() {
            const listEl = document.getElementById("list");
            listEl.innerHTML = '<div class="py-20 text-center animate-pulse text-red-600 font-bold col-span-full">Sinkronisasi pesan...</div>';

            try {
                const res = await fetch(API_BASE + "/api/user/messages", { headers: authHeaders() });
                const data = await res.json();
                const messages = data.messages || [];

                if (!messages.length) {
                    listEl.innerHTML = `
                    <div class="py-20 flex flex-col items-center justify-center col-span-full text-slate-300">
                        <svg class="w-20 h-20 mb-4 opacity-50 text-red-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                        <p class="font-extrabold text-slate-400 text-lg">Inbox Anda Kosong.</p>
                        <p class="text-sm font-medium mt-1">Pesan yang masuk akan muncul di sini.</p>
                    </div>`;
                    return;
                }

                listEl.innerHTML = messages.map(m => `
                    <div onclick="openModalAndFetchData('${m.id}')" class="p-5 bg-white border border-slate-200 rounded-[1.5rem] hover:border-red-400 hover:shadow-xl hover:-translate-y-1 cursor-pointer transition-all group flex flex-col h-full animate-fade-in">
                        <div class="flex-1">
                            <h4 class="font-extrabold text-slate-900 text-sm sm:text-base group-hover:text-red-600 line-clamp-2 leading-snug mb-2">${escapeHtml(m.subject || "No Subject")}</h4>
                            <p class="text-xs text-slate-500 line-clamp-1 font-medium">Dari: ${escapeHtml(m.from_email)}</p>
                        </div>
                        <div class="mt-4 pt-4 border-t border-slate-50 flex items-center justify-between">
                            <span class="text-[10px] sm:text-xs text-slate-400 font-bold">${m.received_at}</span>
                            <span class="text-xs font-bold text-red-600 bg-red-50 px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-1">Buka <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></span>
                        </div>
                    </div>
                `).join("");
            } catch (err) { listEl.innerHTML = "<div class='text-rose-500 font-bold text-center col-span-full py-10'>Gagal mengambil pesan dari server.</div>"; }
        }

        // Jalankan saat load halaman
        if(auth) {
            loadMessages();
        }
    </script>
</body>
</html>
