<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel User</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <span class="navbar-brand mb-0 h1">Panel User</span>
      <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container py-4">
    <div class="card border-0 shadow-sm rounded-4 mb-4">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
          <div>
            <h4 class="mb-1">Inbox Saya</h4>
            <div class="text-secondary">Email aktif: <b id="activeEmail"></b></div>
          </div>
          <button class="btn btn-dark" onclick="loadMessages()">Refresh</button>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-lg-5">
        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body">
            <h5 class="mb-3">Daftar Pesan</h5>
            <div id="list">Memuat...</div>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body">
            <h5 class="mb-3">Detail Pesan</h5>
            <div id="detail" class="text-secondary">Pilih pesan untuk melihat isi.</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://api.sonten.web.id";
    const auth = JSON.parse(localStorage.getItem("auth_user") || "null");

    if (!auth || auth.role !== "user") {
      location.href = "./login.html";
    }

    document.getElementById("activeEmail").textContent = auth.email;

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function authHeaders() {
      return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + auth.token
      };
    }

    async function loadMessages() {
      const listEl = document.getElementById("list");
      const detailEl = document.getElementById("detail");

      listEl.innerHTML = "Memuat inbox...";

      const res = await fetch(API_BASE + "/api/user/messages", {
        headers: authHeaders()
      });

      const data = await res.json();

      if (!res.ok) {
        listEl.innerHTML = '<div class="alert alert-danger">' + escapeHtml(data.error || "Gagal memuat inbox") + '</div>';
        return;
      }

      const messages = data.messages || [];

      if (!messages.length) {
        listEl.innerHTML = '<div class="alert alert-secondary">Inbox kosong.</div>';
        detailEl.innerHTML = "Pilih pesan untuk melihat isi.";
        return;
      }

      listEl.innerHTML = messages.map(function(msg) {
        return `
          <div class="border rounded-3 p-3 mb-3 bg-body-tertiary">
            <div class="fw-bold">${escapeHtml(msg.subject || "(No Subject)")}</div>
            <div class="small text-secondary">Dari: ${escapeHtml(msg.from_email || "-")}</div>
            <div class="small text-secondary">Waktu: ${escapeHtml(msg.received_at || "-")}</div>
            <div class="mt-3 d-flex gap-2">
              <button class="btn btn-sm btn-dark" onclick="openMessage('${msg.id}')">Buka</button>
              <button class="btn btn-sm btn-outline-danger" onclick="deleteMessage('${msg.id}')">Hapus</button>
            </div>
          </div>
        `;
      }).join("");
    }

    async function openMessage(id) {
      const detailEl = document.getElementById("detail");
      detailEl.innerHTML = "Memuat detail...";

      const res = await fetch(API_BASE + "/api/user/message/" + id, {
        headers: authHeaders()
      });

      const data = await res.json();

      if (!res.ok) {
        detailEl.innerHTML = '<div class="alert alert-danger">' + escapeHtml(data.error || "Gagal membuka pesan") + '</div>';
        return;
      }

      detailEl.innerHTML = `
        <div class="mb-2"><b>Subject:</b> ${escapeHtml(data.subject || "(No Subject)")}</div>
        <div class="mb-2"><b>Dari:</b> ${escapeHtml(data.from_email || "-")}</div>
        <div class="mb-2"><b>Untuk:</b> ${escapeHtml(data.user_email || "-")}</div>
        <div class="mb-3"><b>Waktu:</b> ${escapeHtml(data.received_at || "-")}</div>
        <pre class="bg-light border rounded-3 p-3">${escapeHtml(data.body_text || "")}</pre>
      `;
    }

    async function deleteMessage(id) {
      if (!confirm("Hapus pesan ini?")) return;

      const res = await fetch(API_BASE + "/api/user/message/" + id, {
        method: "DELETE",
        headers: authHeaders()
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.error || "Gagal hapus pesan");
        return;
      }

      document.getElementById("detail").innerHTML = "Pilih pesan untuk melihat isi.";
      loadMessages();
    }

    function logout() {
      localStorage.removeItem("auth_user");
      location.href = "./login.html";
    }

    loadMessages();
  </script>
</body>
</html>
