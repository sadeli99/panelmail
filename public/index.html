<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Login - MailPanel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
    </style>
</head>
<body class="min-h-screen text-slate-900 selection:bg-red-100 selection:text-red-900 flex items-center justify-center p-4 sm:p-6 relative overflow-hidden">

    <!-- Dekorasi Latar Belakang Abstrak (Gaya Dribbble) -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-red-400/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob"></div>
        <div class="absolute top-[20%] right-[-5%] w-96 h-96 bg-rose-400/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-orange-400/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob"></div>
    </div>

    <!-- Container Utama -->
    <div class="w-full max-w-[420px] relative z-10">
        
        <!-- Kartu Login -->
        <div class="bg-white/80 backdrop-blur-2xl rounded-[2.5rem] shadow-[0_20px_60px_-15px_rgba(225,29,72,0.15)] p-8 sm:p-12 border border-white">
            
            <!-- Header Kartu -->
            <div class="mb-10 text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-red-600 to-rose-500 rounded-[1.25rem] mb-6 shadow-lg shadow-red-500/30 transform transition-transform hover:scale-105">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                </div>
                <h1 class="text-2xl sm:text-[28px] font-extrabold tracking-tight text-slate-900 leading-tight">Selamat Datang</h1>
                <p class="text-sm font-medium text-slate-500 mt-2">Masuk untuk mengelola email Anda</p>
            </div>

            <!-- Form -->
            <form id="loginForm" class="space-y-5">
                
                <!-- Input Email -->
                <div>
                    <label class="block text-[13px] font-bold text-slate-700 mb-2 ml-1">Alamat Email</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-slate-400 group-focus-within:text-red-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path></svg>
                        </div>
                        <input id="email" type="email" class="w-full rounded-2xl border-2 border-transparent bg-slate-50/80 px-4 py-4 pl-11 text-sm font-medium text-slate-900 focus:bg-white focus:border-red-500 focus:ring-4 focus:ring-red-500/10 outline-none transition-all placeholder:text-slate-400" placeholder="nama@email.com" required />
                    </div>
                </div>

                <!-- Input Kata Sandi -->
                <div>
                    <label class="block text-[13px] font-bold text-slate-700 mb-2 ml-1">Kata Sandi</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-slate-400 group-focus-within:text-red-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <input id="password" type="password" class="w-full rounded-2xl border-2 border-transparent bg-slate-50/80 px-4 py-4 pl-11 pr-12 text-sm font-medium text-slate-900 focus:bg-white focus:border-red-500 focus:ring-4 focus:ring-red-500/10 outline-none transition-all placeholder:text-slate-400" placeholder="••••••••" required />
                        
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-red-600 transition-colors focus:outline-none">
                            <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Tombol Submit -->
                <div class="pt-4">
                    <button id="submitBtn" type="submit" class="w-full relative group overflow-hidden rounded-2xl bg-red-600 text-white py-4 font-extrabold text-[15px] shadow-[0_10px_20px_-10px_rgba(220,38,38,0.5)] hover:shadow-[0_15px_25px_-10px_rgba(220,38,38,0.6)] hover:-translate-y-[1px] active:translate-y-[1px] transition-all duration-200">
                        <span id="btnText" class="relative z-10 flex items-center justify-center gap-2">
                            Masuk Sekarang
                            <svg class="w-4 h-4 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </span>
                        <!-- Efek Loading dalam Button -->
                        <span id="btnLoader" class="absolute inset-0 z-10 flex items-center justify-center bg-red-700 hidden">
                            <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                            Memproses...
                        </span>
                    </button>
                </div>
            </form>

            <div id="msgContainer" class="mt-6 text-center hidden">
                <p id="msg" class="text-[13px] font-bold rounded-xl py-3 px-4"></p>
            </div>
            
        </div>
        
        <p class="text-center text-slate-400 font-medium text-xs mt-8">&copy; 2026 MailPanel. Hak Cipta Dilindungi.</p>
    </div>

    <script>
        const API_BASE = "https://api.sonten.web.id";

        // Fitur Toggle Tampilkan/Sembunyikan Password
        function togglePassword() {
            const passInput = document.getElementById("password");
            const eyeIcon = document.getElementById("eyeIcon");
            
            if (passInput.type === "password") {
                passInput.type = "text";
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>`;
            } else {
                passInput.type = "password";
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>`;
            }
        }

        // Fungsi aman untuk redirect di lingkungan Sandbox/Preview
        function safeRedirect(url) {
            try {
                window.location.href = url;
            } catch (e) {
                console.error("Redirect diblokir oleh lingkungan preview:", e);
                document.body.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-slate-50 p-6">
                        <div class="bg-white p-8 rounded-[2rem] shadow-xl text-center max-w-md border border-slate-100">
                            <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            <h2 class="text-xl font-extrabold text-slate-900 mb-2">Berhasil Login!</h2>
                            <p class="text-slate-500 mb-6 text-sm font-medium">Sesi telah disimpan. Sistem akan mengalihkan Anda ke <b>${url}</b>, namun lingkungan preview membatasi navigasi otomatis. Silakan buka file <b>${url}</b> secara manual.</p>
                        </div>
                    </div>`;
            }
        }

        // CEK SESI: Jika sudah ada sesi aktif, langsung lempar ke halaman yang sesuai
        try {
            const storedAuth = localStorage.getItem("auth_user");
            if (storedAuth) {
                const auth = JSON.parse(storedAuth);
                if (auth && auth.token) {
                    safeRedirect(auth.role === "admin" ? "admin.html" : "user.html");
                }
            }
        } catch (err) {
            localStorage.removeItem("auth_user");
        }

        const loginForm = document.getElementById("loginForm");
        const msgContainer = document.getElementById("msgContainer");
        const msg = document.getElementById("msg");
        const btnText = document.getElementById("btnText");
        const btnLoader = document.getElementById("btnLoader");
        const submitBtn = document.getElementById("submitBtn");

        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            
            // Set state tombol jadi loading
            submitBtn.disabled = true;
            btnText.classList.add("hidden");
            btnLoader.classList.remove("hidden");
            msgContainer.classList.add("hidden");

            const email = document.getElementById("email").value.trim().toLowerCase();
            const password = document.getElementById("password").value.trim();

            try {
                const res = await fetch(API_BASE + "/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    // Tampilkan Error
                    msgContainer.classList.remove("hidden");
                    msg.className = "text-[13px] font-bold rounded-xl py-3 px-4 bg-rose-50 text-rose-600 border border-rose-100";
                    msg.innerHTML = `<span class="flex items-center justify-center gap-1.5"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> ${data.error || "Email atau kata sandi salah"}</span>`;
                    
                    // Kembalikan state tombol
                    submitBtn.disabled = false;
                    btnText.classList.remove("hidden");
                    btnLoader.classList.add("hidden");
                    return;
                }

                // Simpan Sesi 
                localStorage.setItem("auth_user", JSON.stringify(data.user));
                
                // Tampilkan Sukses
                msgContainer.classList.remove("hidden");
                msg.className = "text-[13px] font-bold rounded-xl py-3 px-4 bg-emerald-50 text-emerald-600 border border-emerald-100";
                msg.innerHTML = `<span class="flex items-center justify-center gap-1.5"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Login berhasil! Mengalihkan...</span>`;
                
                setTimeout(() => {
                    safeRedirect(data.user.role === "admin" ? "admin.html" : "user.html");
                }, 600);
                
            } catch (err) {
                // Tampilkan Error Koneksi
                msgContainer.classList.remove("hidden");
                msg.className = "text-[13px] font-bold rounded-xl py-3 px-4 bg-rose-50 text-rose-600 border border-rose-100";
                msg.innerHTML = `<span class="flex items-center justify-center gap-1.5"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Gagal terhubung ke server</span>`;
                
                // Kembalikan state tombol
                submitBtn.disabled = false;
                btnText.classList.remove("hidden");
                btnLoader.classList.add("hidden");
            }
        });
    </script>
</body>
</html>
