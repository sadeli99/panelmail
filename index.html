<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Panel Mail</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-lg p-8">
      <div class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-slate-900">Panel Mail</h1>
        <p class="text-slate-500 mt-2">Masuk ke panel admin atau inbox user</p>
      </div>

      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
          <input
            id="email"
            type="email"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-slate-900 focus:border-slate-900"
            placeholder="email@domain.com"
            required
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
          <input
            id="password"
            type="password"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-slate-900 focus:border-slate-900"
            placeholder="Password"
            required
          />
        </div>

        <button
          type="submit"
          class="w-full rounded-xl bg-slate-900 text-white py-3 font-semibold hover:bg-slate-800 transition"
        >
          Login
        </button>
      </form>

      <div id="msg" class="mt-4 text-sm text-red-600 text-center"></div>
    </div>
  </div>

  <script>
    const API_BASE = "https://api.sonten.web.id";

    const loginForm = document.getElementById("loginForm");
    const msg = document.getElementById("msg");

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "Memproses...";

      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();

      try {
        const res = await fetch(API_BASE + "/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          msg.textContent = data.error || "Login gagal";
          return;
        }

        localStorage.setItem("auth_user", JSON.stringify(data.user));

        if (data.user.role === "admin") {
          window.location.href = "./admin.html";
        } else {
          window.location.href = "./user.html";
        }
      } catch (err) {
        msg.textContent = "Tidak bisa terhubung ke server";
      }
    });
  </script>
</body>
</html>
