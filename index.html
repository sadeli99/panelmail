<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - MailPanel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 selection:bg-indigo-100 selection:text-indigo-900">

    <div class="min-h-screen flex items-center justify-center p-4 sm:p-6 relative overflow-hidden">
        <!-- Dekorasi Latar -->
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-500/10 rounded-full blur-3xl pointer-events-none"></div>

        <div class="w-full max-w-md relative z-10">
            <div class="bg-white/80 backdrop-blur-xl rounded-[2rem] shadow-2xl shadow-slate-200/50 p-6 sm:p-10 border border-white">
                <div class="mb-8 sm:mb-10 text-center">
                    <div class="inline-flex items-center justify-center w-14 h-14 sm:w-16 sm:h-16 bg-gradient-to-tr from-indigo-600 to-blue-500 rounded-2xl mb-4 shadow-lg shadow-indigo-200">
                        <svg class="w-7 h-7 sm:w-8 sm:h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </div>
                    <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight text-slate-900">MailPanel</h1>
                    <p class="text-sm sm:text-base text-slate-500 mt-2 font-medium">Masuk ke ruang kerja Anda</p>
                </div>

                <form id="loginForm" class="space-y-4 sm:space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Alamat Email</label>
                        <input id="email" type="email" class="w-full rounded-2xl border border-slate-200 bg-white/50 px-4 py-3.5 outline-none focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-sm sm:text-base font-medium" placeholder="name@example.com" required />
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Kata Sandi</label>
                        <input id="password" type="password" class="w-full rounded-2xl border border-slate-200 bg-white/50 px-4 py-3.5 outline-none focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-sm sm:text-base font-medium" placeholder="••••••••" required />
                    </div>

                    <button type="submit" class="w-full rounded-2xl bg-indigo-600 text-white py-3.5 sm:py-4 font-bold hover:bg-indigo-700 shadow-xl shadow-indigo-200 transform active:scale-[0.98] transition-all text-sm sm:text-base">
                        Masuk Sekarang
                    </button>
                </form>
                <div id="msg" class="mt-6 text-sm text-center font-bold"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://api.sonten.web.id";

        // Fungsi aman untuk redirect di lingkungan Sandbox/Preview
        function safeRedirect(url) {
            try {
                window.location.href = url;
            } catch (e) {
                console.error("Redirect diblokir oleh lingkungan preview:", e);
                document.body.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-slate-50 p-6">
                        <div class="bg-white p-8 rounded-[2rem] shadow-xl text-center max-w-md border border-slate-100">
                            <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            <h2 class="text-xl font-extrabold text-slate-900 mb-2">Berhasil Login!</h2>
                            <p class="text-slate-500 mb-6 text-sm">Sesi telah disimpan. Sistem akan mengalihkan Anda ke <b>${url}</b>, namun lingkungan preview membatasi navigasi otomatis. Silakan buka file <b>${url}</b> secara manual.</p>
                        </div>
                    </div>`;
            }
        }

        // CEK SESI: Jika sudah ada sesi aktif, langsung lempar ke halaman yang sesuai
        try {
            const storedAuth = localStorage.getItem("auth_user");
            if (storedAuth) {
                const auth = JSON.parse(storedAuth);
                if (auth && auth.token) {
                    safeRedirect(auth.role === "admin" ? "admin.html" : "user.html");
                }
            }
        } catch (err) {
            localStorage.removeItem("auth_user");
        }

        const loginForm = document.getElementById("loginForm");
        const msg = document.getElementById("msg");

        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            msg.className = "mt-6 text-sm text-center font-bold text-indigo-600 animate-pulse";
            msg.textContent = "Memverifikasi...";

            const email = document.getElementById("email").value.trim().toLowerCase();
            const password = document.getElementById("password").value.trim();

            try {
                const res = await fetch(API_BASE + "/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    msg.className = "mt-6 text-sm text-center font-bold text-rose-600";
                    msg.textContent = data.error || "Akses ditolak. Cek email/password.";
                    return;
                }

                // Simpan Sesi 
                localStorage.setItem("auth_user", JSON.stringify(data.user));
                
                msg.className = "mt-6 text-sm text-center font-bold text-emerald-600";
                msg.textContent = "Berhasil masuk! Mengalihkan...";
                
                // Beri jeda sedikit untuk efek visual, lalu pindah halaman
                setTimeout(() => {
                    safeRedirect(data.user.role === "admin" ? "admin.html" : "user.html");
                }, 600);
                
            } catch (err) {
                msg.className = "mt-6 text-sm text-center font-bold text-rose-600";
                msg.textContent = "Koneksi terputus ke server.";
            }
        });
    </script>
</body>
</html>
