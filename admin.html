<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - MailPanel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 selection:bg-indigo-100 selection:text-indigo-900">

    <header class="glass border-b border-slate-200 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 sm:py-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 sm:gap-0">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2.5 rounded-xl hidden sm:block shadow-md shadow-indigo-100">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                </div>
                <div>
                    <h1 class="text-lg sm:text-xl font-extrabold text-slate-900">Admin Dashboard</h1>
                    <p class="text-[10px] sm:text-xs text-slate-500 font-bold" id="adminEmailDisplay"></p>
                </div>
            </div>
            <button onclick="logout()" class="px-4 py-2 w-full sm:w-auto bg-rose-50 text-rose-600 rounded-xl text-sm font-bold hover:bg-rose-100 transition-colors">Keluar</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8 space-y-6 sm:space-y-8">
        
        <!-- Baris Atas: Tambah User & Database -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 sm:gap-8">
            <!-- Tambah User Card -->
            <div class="lg:col-span-1 bg-white rounded-[2rem] p-5 sm:p-7 shadow-sm border border-slate-100">
                <h2 class="text-base sm:text-lg font-extrabold text-slate-900 mb-4 sm:mb-6 flex items-center gap-2">
                    <div class="p-1.5 bg-indigo-50 rounded-lg text-indigo-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg></div>
                    Tambah Akun Baru
                </h2>
                <div class="space-y-3 sm:space-y-4">
                    <input id="newEmail" class="w-full rounded-2xl border border-slate-200 px-4 py-3.5 text-sm font-medium focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none" placeholder="Email Baru" />
                    <input id="newPassword" type="password" class="w-full rounded-2xl border border-slate-200 px-4 py-3.5 text-sm font-medium focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none" placeholder="Kata Sandi" />
                    <select id="newRole" class="w-full rounded-2xl border border-slate-200 px-4 py-3.5 text-sm font-bold text-slate-700 focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none bg-white">
                        <option value="user">Hak Akses: User</option>
                        <option value="admin">Hak Akses: Admin</option>
                    </select>
                    <button onclick="createUser()" class="w-full bg-indigo-600 text-white py-3.5 rounded-2xl font-bold text-sm hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 mt-2">Simpan Akun</button>
                    <div id="adminMsg" class="text-xs text-center font-bold py-2 text-slate-500"></div>
                </div>
            </div>

            <!-- Tabel Database -->
            <div class="lg:col-span-2 bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden flex flex-col">
                <div class="px-5 sm:px-7 py-5 sm:py-6 border-b border-slate-100 flex items-center justify-between bg-white shrink-0">
                    <h2 class="text-base sm:text-lg font-extrabold text-slate-900">Database Pengguna</h2>
                    <button onclick="loadUsers()" class="flex items-center gap-2 text-indigo-600 font-bold text-xs sm:text-sm hover:text-indigo-700 bg-indigo-50 px-4 py-2 rounded-xl transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        <span class="hidden sm:inline">Perbarui</span>
                    </button>
                </div>
                <div class="overflow-x-auto custom-scrollbar flex-1">
                    <table class="w-full text-left whitespace-nowrap min-w-[650px]">
                        <thead>
                            <tr class="text-xs uppercase tracking-wider text-slate-400 bg-slate-50/50">
                                <th class="px-5 sm:px-7 py-4 font-extrabold">Akun Email</th>
                                <th class="px-5 sm:px-7 py-4 font-extrabold">Role</th>
                                <th class="px-5 sm:px-7 py-4 font-extrabold">Status</th>
                                <th class="px-5 sm:px-7 py-4 font-extrabold text-right">Tindakan</th>
                            </tr>
                        </thead>
                        <tbody id="userTable" class="divide-y divide-slate-100 text-sm font-medium">
                            <!-- Injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Baris Bawah: Split View Inspeksi Inbox -->
        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-5 sm:p-7 border-b border-slate-100 bg-white">
                <h2 class="text-base sm:text-lg font-extrabold text-slate-900 mb-4 flex items-center gap-2">
                    <div class="p-1.5 bg-blue-50 rounded-lg text-blue-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></div>
                    Inspeksi Inbox User
                </h2>
                <div class="flex flex-col sm:flex-row gap-3">
                    <input id="inspectEmail" class="flex-1 rounded-2xl border border-slate-200 px-4 py-3.5 text-sm font-medium focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none" placeholder="Ketik alamat email user untuk memeriksa inboxnya..." />
                    <button onclick="loadUserMessages()" class="bg-slate-900 text-white px-6 sm:px-8 py-3.5 rounded-2xl font-bold text-sm hover:bg-slate-800 transition-all shadow-lg shadow-slate-200 shrink-0">Periksa Inbox</button>
                </div>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 divide-y lg:divide-y-0 lg:divide-x divide-slate-100 bg-slate-50/50 min-h-[500px]">
                <!-- Panel Kiri: Daftar Pesan -->
                <div class="lg:col-span-1 p-5 max-h-[600px] overflow-y-auto custom-scrollbar flex flex-col">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">Daftar Pesan Masuk</h3>
                    <div id="inspectList" class="space-y-3">
                        <div class="text-sm text-slate-400 font-medium italic text-center py-10 bg-white rounded-2xl border border-slate-200 border-dashed">Ketik email di atas untuk memulai inspeksi.</div>
                    </div>
                </div>
                
                <!-- Panel Kanan: Detail Pesan (inspectDetail) -->
                <div class="lg:col-span-2 p-5 sm:p-7 max-h-[600px] overflow-y-auto custom-scrollbar bg-white flex flex-col" id="inspectDetail">
                    <div class="flex-1 flex flex-col items-center justify-center text-slate-400">
                        <svg class="w-16 h-16 mb-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        <p class="font-bold">Detail Pesan</p>
                        <p class="text-sm font-medium">Pilih pesan di sebelah kiri untuk melihat isinya.</p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- UI Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-slate-900/30 backdrop-blur-sm z-[70] flex items-center justify-center hidden transition-opacity">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl flex flex-col items-center modal-animate">
            <div class="animate-spin rounded-full h-12 w-12 border-[4px] border-indigo-100 border-t-indigo-600 mb-4"></div>
            <p class="text-sm font-extrabold text-slate-700">Mohon tunggu...</p>
        </div>
    </div>

    <script>
        const API_BASE = "https://api.sonten.web.id";

        function safeRedirect(url) {
            try { window.location.href = url; } catch (e) {
                document.body.innerHTML = `<div class="p-6 text-center">Dialihkan ke ${url}...</div>`;
            }
        }
        
        // --- AUTH PROTEKSI ---
        let auth = null;
        try {
            const storedAuth = localStorage.getItem("auth_user");
            if (!storedAuth) {
                safeRedirect("./index.html");
            } else {
                auth = JSON.parse(storedAuth);
                if (auth.role !== "admin") safeRedirect("./user.html"); 
            }
        } catch (error) {
            localStorage.removeItem("auth_user");
            safeRedirect("./index.html");
        }

        if (auth && document.getElementById('adminEmailDisplay')) {
            document.getElementById('adminEmailDisplay').textContent = auth.email;
        }

        function authHeaders() {
            return { "Content-Type": "application/json", "Authorization": "Bearer " + (auth ? auth.token : "") };
        }

        function logout() {
            localStorage.removeItem("auth_user");
            safeRedirect("./index.html");
        }

        function escapeHtml(str) {
            return String(str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        function setLoading(state) {
            const overlay = document.getElementById('loadingOverlay');
            state ? overlay.classList.remove('hidden') : overlay.classList.add('hidden');
        }

        // --- MIME EMAIL PARSER ---
        function decodeQuotedPrintable(input) {
            let str = input.replace(/=\r?\n/g, ''); 
            str = str.replace(/=([a-fA-F0-9]{2})/g, "%$1"); 
            try { return decodeURIComponent(str); } catch(e) { return unescape(str); }
        }

        function parseEmail(raw) {
            if (!raw) return { type: 'text', content: '', raw: '' };
            if (!raw.includes('Content-Type: multipart')) return { type: 'text', content: raw, raw: raw };

            let htmlBlock = "";
            let textBlock = "";
            
            const parts = raw.split(/------=_[^\r\n]+/);
            for (let part of parts) {
                if (part.match(/Content-Type:\s*text\/html/i)) htmlBlock = part;
                else if (part.match(/Content-Type:\s*text\/plain/i)) textBlock = part;
            }

            let selected = htmlBlock || textBlock;
            if (!selected) return { type: 'text', content: raw, raw: raw };

            let isHtml = !!htmlBlock;
            let contentMatch = selected.match(/\r?\n\r?\n([\s\S]*)/);
            if (!contentMatch) return { type: 'text', content: raw, raw: raw };

            let content = contentMatch[1].trim();
            if (selected.match(/Content-Transfer-Encoding:\s*quoted-printable/i)) {
                content = decodeQuotedPrintable(content);
            }
            return { type: isHtml ? 'html' : 'text', content: content, raw: raw };
        }

        let currentParsedEmail = null;

        function toggleViewMode(mode) {
            if (!currentParsedEmail) return;
            const container = document.getElementById('inspectBodyContainer');
            const btnHtml = document.getElementById('btnViewHtml');
            const btnRaw = document.getElementById('btnViewRaw');

            container.innerHTML = '';

            if (mode === 'html') {
                btnHtml.className = "px-3 py-1.5 rounded-lg bg-white text-indigo-600 shadow-sm transition-all";
                btnRaw.className = "px-3 py-1.5 rounded-lg text-slate-500 hover:text-slate-700 transition-all";
                
                const iframe = document.createElement('iframe');
                iframe.className = "w-full min-h-[400px] border-0 bg-white flex-1 rounded-2xl";
                iframe.sandbox = "allow-same-origin allow-popups"; 
                iframe.srcdoc = currentParsedEmail.content;
                container.appendChild(iframe);
            } else {
                btnRaw.className = "px-3 py-1.5 rounded-lg bg-white text-indigo-600 shadow-sm transition-all";
                btnHtml.className = "px-3 py-1.5 rounded-lg text-slate-500 hover:text-slate-700 transition-all";

                const pre = document.createElement('pre');
                pre.className = "whitespace-pre-wrap font-mono text-slate-700 leading-relaxed text-xs p-5 flex-1 overflow-x-auto rounded-2xl";
                pre.textContent = currentParsedEmail.raw;
                container.appendChild(pre);
            }
        }

        // --- ADMIN: LOAD USERS ---
        async function loadUsers() {
            const userTable = document.getElementById("userTable");
            userTable.innerHTML = '<tr><td colspan="4" class="px-7 py-10 text-center text-slate-400 font-bold animate-pulse">Sinkronisasi data...</td></tr>';

            try {
                const res = await fetch(API_BASE + "/api/admin/users", { headers: authHeaders() });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                const users = data.users || [];
                if (!users.length) {
                    userTable.innerHTML = '<tr><td colspan="4" class="px-7 py-10 text-center text-slate-400">Tidak ada pengguna ditemukan.</td></tr>';
                    return;
                }

                userTable.innerHTML = users.map(u => {
                    const statusColor = u.status === "active" ? "bg-emerald-50 text-emerald-600" : "bg-rose-50 text-rose-600";
                    const toggleLabel = u.status === "active" ? "Bekukan" : "Aktifkan";
                    const toggleTarget = u.status === "active" ? "inactive" : "active";

                    return `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-5 sm:px-7 py-4 font-bold text-slate-900 truncate max-w-[150px] sm:max-w-none">${escapeHtml(u.email)}</td>
                            <td class="px-5 sm:px-7 py-4"><span class="px-3 py-1.5 bg-slate-100 rounded-lg text-[10px] font-extrabold uppercase text-slate-600">${escapeHtml(u.role)}</span></td>
                            <td class="px-5 sm:px-7 py-4">
                                <span class="px-3 py-1.5 rounded-lg text-[10px] font-extrabold uppercase ${statusColor}">${u.status}</span>
                            </td>
                            <td class="px-5 sm:px-7 py-4 text-right">
                                <div class="flex items-center justify-end gap-2">
                                    <button onclick="prefillInspect('${u.email}')" class="p-2 hover:bg-indigo-50 text-indigo-600 rounded-xl transition-colors" title="Lihat Inbox">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                    </button>
                                    <button onclick="resetPassword('${u.email}')" class="p-2 hover:bg-blue-50 text-blue-600 rounded-xl transition-colors" title="Reset Pass">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                                    </button>
                                    <button onclick="toggleStatus('${u.email}', '${toggleTarget}')" class="p-2 hover:bg-slate-100 text-slate-600 rounded-xl transition-colors" title="${toggleLabel}">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>
                                    </button>
                                    <button onclick="deleteUser('${u.email}')" class="p-2 hover:bg-rose-50 text-rose-600 rounded-xl transition-colors" title="Hapus Akun">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    </button>
                                </div>
                            </td>
                        </tr>`;
                }).join("");
            } catch (err) { userTable.innerHTML = '<tr><td colspan="4" class="px-7 py-10 text-center text-rose-500 font-bold">Terjadi kesalahan saat memuat data.</td></tr>'; }
        }

        async function createUser() {
            const email = document.getElementById("newEmail").value.trim().toLowerCase();
            const password = document.getElementById("newPassword").value.trim();
            const role = document.getElementById("newRole").value;
            const msgEl = document.getElementById("adminMsg");

            if(!email || !password) return alert("Email dan password wajib diisi");

            setLoading(true);
            try {
                const res = await fetch(API_BASE + "/api/admin/create-user", {
                    method: "POST", headers: authHeaders(), body: JSON.stringify({ email, password, role })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                msgEl.textContent = "✓ User berhasil ditambahkan";
                msgEl.className = "text-xs text-center font-bold py-2 text-emerald-600";
                
                document.getElementById("newEmail").value = "";
                document.getElementById("newPassword").value = "";
                loadUsers();
            } catch (err) {
                msgEl.textContent = "× " + err.message;
                msgEl.className = "text-xs text-center font-bold py-2 text-rose-600";
            } finally { setLoading(false); }
        }

        async function resetPassword(email) {
            const newPassword = prompt("Masukkan sandi baru untuk " + email);
            if (!newPassword) return;
            setLoading(true);
            try {
                const res = await fetch(API_BASE + "/api/admin/reset-password", {
                    method: "POST", headers: authHeaders(), body: JSON.stringify({ email, newPassword })
                });
                if (res.ok) alert("Password berhasil diperbarui!");
            } catch (err) { alert("Gagal memperbarui password"); }
            finally { setLoading(false); }
        }

        async function toggleStatus(email, status) {
            setLoading(true);
            try {
                await fetch(API_BASE + "/api/admin/set-status", {
                    method: "POST", headers: authHeaders(), body: JSON.stringify({ email, status })
                });
                loadUsers();
            } catch (err) { alert("Gagal mengubah status"); }
            finally { setLoading(false); }
        }

        async function deleteUser(email) {
            if (!confirm(`Hapus permanen akun ${email}? Data tidak bisa dikembalikan.`)) return;
            setLoading(true);
            try {
                await fetch(API_BASE + "/api/admin/delete-user", {
                    method: "POST", headers: authHeaders(), body: JSON.stringify({ email })
                });
                loadUsers();
            } catch (err) { alert("Gagal menghapus user"); }
            finally { setLoading(false); }
        }

        // --- ADMIN: INSPEKUSI INBOX ---
        function prefillInspect(email) {
            document.getElementById("inspectEmail").value = email;
            loadUserMessages();
            document.getElementById("inspectEmail").scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        async function loadUserMessages() {
            const email = document.getElementById("inspectEmail").value.trim().toLowerCase();
            const listEl = document.getElementById("inspectList");
            if (!email) return;

            // Reset detail area when loading new inbox
            document.getElementById("inspectDetail").innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center text-slate-400">
                    <svg class="w-16 h-16 mb-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    <p class="font-bold">Detail Pesan</p>
                    <p class="text-sm font-medium">Pilih pesan di sebelah kiri untuk melihat isinya.</p>
                </div>
            `;

            listEl.innerHTML = '<div class="text-sm text-indigo-600 font-bold animate-pulse text-center py-5">Scanning inbox...</div>';
            try {
                const res = await fetch(API_BASE + "/api/admin/messages?email=" + encodeURIComponent(email), { headers: authHeaders() });
                const data = await res.json();
                const messages = data.messages || [];

                if (!messages.length) {
                    listEl.innerHTML = '<div class="text-sm text-slate-400 font-medium italic text-center py-5 bg-white rounded-2xl border border-slate-200 border-dashed">Inbox pengguna ini kosong.</div>';
                    return;
                }

                listEl.innerHTML = messages.map(m => `
                    <div class="bg-white border border-slate-200 p-4 rounded-2xl hover:border-indigo-400 hover:shadow-md cursor-pointer transition-all group animate-fade-in" onclick="openAdminMessage('${m.id}')">
                        <div class="font-extrabold text-slate-900 text-sm group-hover:text-indigo-600 line-clamp-1">${escapeHtml(m.subject || "No Subject")}</div>
                        <div class="mt-2 flex justify-between items-center">
                            <span class="text-[10px] text-slate-500 truncate max-w-[120px] font-medium">${escapeHtml(m.from_email)}</span>
                            <span class="text-[10px] text-slate-400 font-bold bg-slate-50 px-2 py-1 rounded-lg">${m.received_at.split(' ')[0]}</span>
                        </div>
                    </div>
                `).join("");
            } catch (err) { listEl.innerHTML = '<div class="text-rose-500 text-xs font-bold text-center py-5">Server Error.</div>'; }
        }

        // --- FUNGSI UTAMA: BUKA DETAIL PESAN DI PANEL KANAN ---
        async function openAdminMessage(id) {
            const detail = document.getElementById("inspectDetail");
            detail.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center">
                    <div class="animate-spin rounded-full h-10 w-10 border-[4px] border-indigo-100 border-t-indigo-600 mb-4"></div>
                    <p class="text-sm font-bold text-indigo-600 animate-pulse">Memuat detail pesan...</p>
                </div>`;

            try {
                const res = await fetch(API_BASE + "/api/user/message/" + id, { headers: authHeaders() });
                const data = await res.json();

                if (!res.ok) throw new Error(data.error || "Gagal membuka pesan");

                // Parse email untuk Canva/HTML
                currentParsedEmail = parseEmail(data.body_text);

                // Buat Tombol Kontrol HTML/Raw jika diperlukan
                let controlsHtml = '';
                if (currentParsedEmail.type === 'html') {
                    controlsHtml = `
                        <div class="mb-4 flex justify-end">
                            <div class="bg-slate-100 p-1 rounded-xl flex inline-flex text-xs font-bold">
                                <button id="btnViewHtml" class="px-3 py-1.5 rounded-lg bg-white text-indigo-600 shadow-sm transition-all" onclick="toggleViewMode('html')">Tampilan Asli</button>
                                <button id="btnViewRaw" class="px-3 py-1.5 rounded-lg text-slate-500 hover:text-slate-700 transition-all" onclick="toggleViewMode('raw')">Data Mentah</button>
                            </div>
                        </div>
                    `;
                }

                // Render Header & Kontainer Detail
                detail.innerHTML = `
                    <div class="animate-fade-in flex flex-col h-full">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <h3 class="text-lg sm:text-xl font-extrabold text-slate-900 mb-2 leading-snug">${escapeHtml(data.subject || "(No Subject)")}</h3>
                                <div class="flex items-center gap-2 text-xs sm:text-sm text-slate-500">
                                    <span class="font-bold text-slate-900 bg-slate-100 px-2 py-1 rounded-md">${escapeHtml(data.from_email)}</span>
                                    <span>&bull;</span>
                                    <span>${data.received_at}</span>
                                </div>
                            </div>
                            <button onclick="adminDeleteMessage('${id}')" class="px-4 py-2 bg-rose-50 text-rose-600 rounded-xl text-xs font-bold hover:bg-rose-100 transition-colors shrink-0 ml-4">Hapus</button>
                        </div>
                        
                        ${controlsHtml}
                        
                        <!-- Kontainer untuk Iframe / Pre -->
                        <div id="inspectBodyContainer" class="flex-1 bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden flex flex-col min-h-[300px]">
                        </div>
                    </div>
                `;

                // Isi kontennya berdasarkan hasil parse
                if (currentParsedEmail.type === 'html') {
                    toggleViewMode('html');
                } else {
                    document.getElementById('inspectBodyContainer').innerHTML = `<pre class="whitespace-pre-wrap font-sans text-slate-700 leading-relaxed text-sm p-5 overflow-x-auto m-0">${escapeHtml(currentParsedEmail.content)}</pre>`;
                }

            } catch (err) {
                detail.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center text-rose-500">
                        <svg class="w-12 h-12 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p class="font-bold">${escapeHtml(err.message)}</p>
                    </div>`;
            }
        }

        async function adminDeleteMessage(id) {
            if (!confirm("Hapus pesan ini secara permanen?")) return;
            setLoading(true);
            try {
                const res = await fetch(API_BASE + "/api/user/message/" + id, { method: "DELETE", headers: authHeaders() });
                if (res.ok) {
                    // Kembalikan area detail ke state kosong
                    document.getElementById("inspectDetail").innerHTML = `
                        <div class="flex-1 flex flex-col items-center justify-center text-slate-400">
                            <svg class="w-16 h-16 mb-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                            <p class="font-bold">Pesan telah dihapus.</p>
                        </div>
                    `;
                    loadUserMessages();
                } else { alert("Gagal menghapus pesan"); }
            } catch (e) { alert("Error saat menghapus"); }
            finally { setLoading(false); }
        }

        // Eksekusi awal
        if (auth) {
            loadUsers();
        }
    </script>
</body>
</html>
