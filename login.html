<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">
        <div class="card shadow-sm border-0 rounded-4">
          <div class="card-body p-4 p-md-5">
            <h2 class="fw-bold mb-2">Login</h2>
            <p class="text-secondary mb-4">Masuk pakai email dan password yang dibuat admin.</p>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input id="email" type="email" class="form-control form-control-lg" placeholder="Email">
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input id="password" type="password" class="form-control form-control-lg" placeholder="Password">
            </div>

            <button id="loginBtn" class="btn btn-dark btn-lg w-100">Login</button>
            <div id="msg" class="mt-3 text-danger small"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://api.sonten.web.id";

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();
      const msg = document.getElementById("msg");

      msg.textContent = "Memproses...";

      const res = await fetch(API_BASE + "/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        msg.textContent = data.error || "Login gagal";
        return;
      }

      localStorage.setItem("auth_user", JSON.stringify(data.user));

      if (data.user.role === "admin") {
        location.href = "./admin.html";
      } else {
        location.href = "./user.html";
      }
    });
  </script>
</body>
</html>
